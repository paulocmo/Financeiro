{% extends "base.html" %}
{% block title %}Cadastro - Financas Familiares{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-logo">
        <div class="logo-icon">📝</div>
        <h1>Cadastro</h1>
        <p>Crie sua conta familiar</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
        <div class="form-group">
            <label class="form-label">Nome</label>
            <input type="text" name="name" class="form-input" placeholder="Seu nome" required autofocus>
        </div>

        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="password" name="password" class="form-input" placeholder="Minimo 6 caracteres" required minlength="6">
        </div>

        <div class="form-group">
            <label class="form-label">Confirmar Senha</label>
            <input type="password" name="confirm" class="form-input" placeholder="Repita a senha" required>
        </div>

        <button type="submit" class="btn-primary btn-full">Criar Conta</button>
    </form>

    <div class="auth-footer">
        <p>Ja tem conta? <a href="{{ url_for('login') }}">Faca login</a></p>
    </div>
</div>
{% endblock %}
